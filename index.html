<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCB vs RMA - Social Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --fcb-bg: linear-gradient(135deg, #004d98 0%, #a50044 100%);
            --rma-bg: linear-gradient(135deg, #ffffff 0%, #d4af37 100%);
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Inter', sans-serif;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .seccion {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: var(--transition);
            cursor: pointer;
            overflow: hidden;
        }

        .arriba { background: var(--fcb-bg); }
        .abajo { background: var(--rma-bg); }

        /* Contenedor central (Escudo) */
        .center-logo {
            width: 140px;
            height: 140px;
            transition: var(--transition);
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
            z-index: 5;
        }

        /* TARJETA ESTILO TWITTER */
        .profile-card {
            position: absolute;
            bottom: -150px; /* Escondida al inicio */
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            width: 320px;
            opacity: 0;
            transition: var(--transition);
            z-index: 10;
        }

        .abajo .profile-card {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .pfp {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }

        .user-info { display: flex; flex-direction: column; }

        .name {
            font-weight: 800;
            font-size: 1.1rem;
            color: white;
        }

        .handle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .abajo .name { color: #1a1a1a; }
        .abajo .handle { color: rgba(0, 0, 0, 0.6); }

        /* BOTÓN CERRAR */
        .btn-back {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            opacity: 0;
            transform: translateY(-20px);
            transition: var(--transition);
            z-index: 100;
        }

        /* ESTADO EXPANDIDO */
        .seccion.full {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
            cursor: default;
        }

        .seccion.full .center-logo {
            transform: translateY(-80px) scale(0.8);
        }

        .seccion.full .profile-card {
            bottom: 15%; /* Sube a su posición */
            opacity: 1;
        }

        .seccion.full .btn-back {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.3s;
        }

        /* Hint */
        .hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="seccion arriba" id="fcb" onclick="abrir(this)">
            <button class="btn-back" onclick="cerrar(event, this)">← VOLVER</button>
            <img src="img/FC_Barcelona_(crest).svg" class="center-logo" alt="Logo">
            
            <div class="profile-card">
                <img src="img/xdemarc_.jpg" class="pfp" alt="PFP">
                <div class="user-info">
                    <span class="name">Rey</span>
                    <span class="handle">@xdemarc_</span>
                </div>
            </div>
            
            <span class="hint">Click para ver perfil</span>
        </div>

        <div class="seccion abajo" id="rma" onclick="abrir(this)">
            <button class="btn-back" onclick="cerrar(event, this)">← VOLVER</button>
            <img src="img/Real_Madrid_CF.svg" class="center-logo" alt="Logo">
            
            <div class="profile-card">
                <img src="img/paulaanaavaasss.jpg" class="pfp" alt="PFP">
                <div class="user-info">
                    <span class="name">Reina</span>
                    <span class="handle">@paulaanaavaasss</span>
                </div>
            </div>

            <span class="hint">Click para ver perfil</span>
        </div>

    </div>

    <script>
        function abrir(el) {
            if (!el.classList.contains('full')) el.classList.add('full');
        }

        function cerrar(ev, btn) {
            ev.stopPropagation();
            btn.parentElement.classList.remove('full');
        }
    </script>

</body>
</html>
